name: Deploy to Vercel (production)

# Deploys to Vercel on every push to main — including the daily data-refresh
# bot commit from update-data.yml — so the live site always reflects main.
# Requires three repo secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID.
# Until VERCEL_TOKEN is set, the job skips cleanly (green) with a warning.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: vercel-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Check for VERCEL_TOKEN
        id: guard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN secret not set — skipping Vercel deploy. Add it in repo Settings → Secrets and variables → Actions."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.ready == 'true'

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.ready == 'true'
        with:
          node-version: "20"

      - name: Install Vercel CLI
        if: steps.guard.outputs.ready == 'true'
        run: npm i -g vercel@latest

      - name: Pull Vercel project settings
        if: steps.guard.outputs.ready == 'true'
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build
        if: steps.guard.outputs.ready == 'true'
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy (prebuilt) to production
        if: steps.guard.outputs.ready == 'true'
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
