name: Deploy to Vercel (production)

# Deploys to Vercel on direct pushes to main and manual dispatches.
# The daily data-refresh workflow deploys Vercel in the same job after committing,
# because pushes made with GITHUB_TOKEN do not trigger another GitHub Actions run.
# Requires repo secrets: VERCEL_OAUTH_TOKEN, VERCEL_REFRESH_TOKEN,
# VERCEL_ORG_ID, and VERCEL_PROJECT_ID.
# Until Vercel auth secrets are set, the job skips cleanly with a warning.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: vercel-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_GLOBAL_CONFIG: ${{ runner.temp }}/vercel-auth
    steps:
      - name: Check Vercel auth secrets
        id: guard
        env:
          VERCEL_OAUTH_TOKEN: ${{ secrets.VERCEL_OAUTH_TOKEN }}
          VERCEL_REFRESH_TOKEN: ${{ secrets.VERCEL_REFRESH_TOKEN }}
        run: |
          if [ -z "$VERCEL_OAUTH_TOKEN" ] || [ -z "$VERCEL_REFRESH_TOKEN" ]; then
            echo "::warning::Vercel auth secrets not set — skipping Vercel deploy. Add VERCEL_OAUTH_TOKEN and VERCEL_REFRESH_TOKEN in repo Settings → Secrets and variables → Actions."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.ready == 'true'

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.ready == 'true'
        with:
          node-version: "24"

      - name: Install Vercel CLI
        if: steps.guard.outputs.ready == 'true'
        run: npm i -g vercel@latest

      - name: Configure Vercel auth
        if: steps.guard.outputs.ready == 'true'
        env:
          VERCEL_OAUTH_TOKEN: ${{ secrets.VERCEL_OAUTH_TOKEN }}
          VERCEL_REFRESH_TOKEN: ${{ secrets.VERCEL_REFRESH_TOKEN }}
        run: |
          mkdir -p "$VERCEL_GLOBAL_CONFIG"
          node <<'NODE'
          const fs = require('fs');
          const dir = process.env.VERCEL_GLOBAL_CONFIG;
          const token = process.env.VERCEL_OAUTH_TOKEN;
          const refreshToken = process.env.VERCEL_REFRESH_TOKEN;
          if (!token || !refreshToken) throw new Error('Missing VERCEL_OAUTH_TOKEN or VERCEL_REFRESH_TOKEN secret');
          fs.writeFileSync(`${dir}/auth.json`, JSON.stringify({ token, expiresAt: 0, refreshToken }, null, 2));
          NODE

      - name: Pull Vercel project settings
        if: steps.guard.outputs.ready == 'true'
        run: vercel pull --yes --environment=production --global-config "$VERCEL_GLOBAL_CONFIG"

      - name: Build
        if: steps.guard.outputs.ready == 'true'
        run: vercel build --prod --global-config "$VERCEL_GLOBAL_CONFIG"

      - name: Deploy (prebuilt) to production
        if: steps.guard.outputs.ready == 'true'
        run: vercel deploy --prebuilt --prod --global-config "$VERCEL_GLOBAL_CONFIG"
